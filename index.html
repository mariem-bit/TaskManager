<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Task Manager — IHEC Carthage</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; padding: 50px; }
    .boite { background: white; padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #1F4E79; text-align: center; }
    input { width: 70%; padding: 10px; border: 2px solid #2E75B6; border-radius: 6px; font-size: 14px; }
    button { padding: 10px 14px; background: #2E75B6; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1F4E79; }
    ul { list-style: none; padding: 0; margin-top: 20px; }
    li { background: #f9f9f9; padding: 10px; margin: 8px 0; border-left: 4px solid #2E75B6; border-radius: 6px; display: flex; justify-content: space-between; }
    .supprimer { background: #dc3545; padding: 4px 10px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="boite">
    <h1>📋 Task Manager</h1>
    <p style="text-align:center; color:#888;">IHEC Carthage</p>
    <div style="display:flex; gap:8px; margin-bottom:10px;">
      <input type="text" id="tache" placeholder="Écrire une tâche..." />
      <button onclick="ajouter()">Ajouter</button>
    </div>
    <ul id="liste"></ul>
  </div>
  <script>
    function ajouter() {
      const texte = document.getElementById('tache').value.trim();
      if (texte === '') return;
      const li = document.createElement('li');
      li.innerHTML = `<span>${texte}</span><button class="supprimer" onclick="this.parentElement.remove()">Supprimer</button>`;
      document.getElementById('liste').appendChild(li);
      document.getElementById('tache').value = '';
    }
    document.getElementById('tache').addEventListener('keypress', e => { if (e.key === 'Enter') ajouter(); });
  </script>
</body>
</html>
