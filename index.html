<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 30px; }
    h1 { color: #2E75B6; }
    input { padding: 8px; width: 300px; }
    button { padding: 8px 16px; background: #2E75B6; color: white; border: none; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { background: white; margin: 8px 0; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Task Manager — IHEC Carthage</h1>
  <input type="text" id="task" placeholder="Ajouter une tâche...">
  <button onclick="addTask()">Ajouter</button>
  <ul id="liste"></ul>
  <script>
    function addTask() {
      const task = document.getElementById('task').value;
      if (task) {
        const li = document.createElement('li');
        li.textContent = task;
        document.getElementById('liste').appendChild(li);
        document.getElementById('task').value = '';
      }
    }
  </script>
</body>
</html>
